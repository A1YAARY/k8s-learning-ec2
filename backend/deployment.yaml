apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
       - name: backend
         image: 044259389207.dkr.ecr.ap-south-1.amazonaws.com/eventpix-backend:latest
         imagePullPolicy: Always
         ports:
         - containerPort: 3000
         env:
          - name: DATABASE_URL
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL

          - name: FRONTEND_URL
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: FRONTEND_URL

          - name: PORT
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: PORT

          - name: JWT_EXPIRE_DAYS
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: JWT_EXPIRE_DAYS

          - name: JWT_SECRET
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET

          - name: AWS_REGION
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: AWS_REGION

          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: AWS_SECRET_ACCESS_KEY

          - name: AWS_ACCESS_KEY_ID
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: AWS_ACCESS_KEY_ID


          - name: S3_BUCKET_NAME
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: S3_BUCKET_NAME


      
         resources:
           requests:
             cpu: "100m"
             memory: "128Mi"
           limits:
             cpu: "200m"
             memory: "256Mi"

      imagePullSecrets:
        - name: docker-secret 