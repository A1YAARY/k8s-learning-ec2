apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      restartPolicy: Always
      containers:
       - name: backend
         image: 044259389207.dkr.ecr.ap-south-1.amazonaws.com/space-bin:latest
         imagePullPolicy: Always
         ports:
         - containerPort: 3000
         env:
          - name: DATABASE_CLIENT
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_CLIENT
          - name: DATABASE_WRITE_HOST
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_WRITE_HOST
          - name: DATABASE_WRITE_PORT
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_WRITE_PORT
          - name: DATABASE_WRITE_USERNAME
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_WRITE_USERNAME
          - name: DATABASE_WRITE_PASSWORD
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_WRITE_PASSWORD
          - name: DATABASE_WRITE_NAME
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_WRITE_NAME
          - name: DATABASE_READ_HOST
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_READ_HOST
          - name: DATABASE_READ_PORT
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_READ_PORT
          - name: DATABASE_READ_USERNAME
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_READ_USERNAME
          - name: DATABASE_READ_PASSWORD
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_READ_PASSWORD
          - name: DATABASE_READ_NAME
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_READ_NAME
          - name: DATABASE_POOL_MIN
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_POOL_MIN
          - name: DATABASE_POOL_MAX
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: DATABASE_POOL_MAX
          - name: PORT
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: PORT
          - name: AWS_REGION
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: AWS_REGION
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: AWS_ACCESS_KEY_ID
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: AWS_SECRET_ACCESS_KEY
          - name: S3_BUCKET
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: S3_BUCKET
          - name: JWT_SECRET
            valueFrom:
               secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET

         resources:
           requests:
             cpu: "100m"
             memory: "128Mi"
           limits:
             cpu: "200m"
             memory: "256Mi"

      imagePullSecrets:
        - name: docker-secret 