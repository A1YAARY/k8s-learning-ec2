apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: production
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
       - name: backend
         image: 044259389207.dkr.ecr.ap-south-1.amazonaws.com/eventpix-backend:latest
         imagePullPolicy: Always
         ports:
         - containerPort: 3000
      
         resources:
           requests:
             cpu: "100m"
             memory: "128Mi"
           limits:
             cpu: "200m"
             memory: "256Mi"

      imagePullSecrets:
        - name: docker-secret 